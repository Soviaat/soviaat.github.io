<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="shortcut icon"
      href="favicon.png"
      type="image/x-icon"
    />
    <title>New Year Countdown</title>
  </head>

  <body class="fireworks">
    <div class="top">
      <div class="dropdown">
      <button onclick="dropDown()" class="dropbtn">☰</button>
        <ul class="dropdown-content" id="dropDown">
          <li>
            <label for="trackingChkbx">Track Mouse
              <input type="checkbox" name="followMouse" class="chkbx" id="trackingChkbx" />
              <span class="checkmark"></span>
            </label>
          </li>
          <li>
            <label for="soundChkbx">Toggle Sound
              <input type="checkbox" name="soundBox" class="chkbx" id="soundChkbx"/>
              <span class="checkmark"></span>
            </label>
          </li>
          <li>
            <label for="toggleFireworks">Toggle Fireworks
              <input type="checkbox" name="fireworkToggle" class="chkbx" id="toggleFireworks" checked/>
              <span class="checkmark"></span>
            </label>
          </li>
        </ul>
      </div>
    </div>

    <div class="bottom">
      &copy; Soviaat
    </div>


    </div>
    <div class="middle">
      <h1 class="label">New Year Countdown</h1>
      <div class="time">
        <span>
          <div id="d">00</div>
          Days
        </span>
        <span>
          <div id="h">00</div>
          Hours
        </span>
        <span>
          <div id="m">00</div>
          Minutes
        </span>
        <span>
          <div id="s">00</div>
          Seconds
        </span>
      </div>
    </div>
    <!-- jsDelivr  -->
    <script src="https://cdn.jsdelivr.net/npm/fireworks-js@2.x/dist/index.umd.js"></script>

    <!-- UNPKG -->
    <script src="https://unpkg.com/fireworks-js@2.x/dist/index.umd.js"></script>

    <!-- bootstrap -->

    <script>
      function dropDown() {
        document.getElementById('dropDown').classList.toggle("show");
      }

      window.onclick = function(e) {
        if (!e.target.matches('.dropbtn')) {
          var dropdowns = document.getElementsByClassName("dropdown-content");
          var i;
          for (i = 0; i < dropdowns.length; i++) {
            var openDropdown = dropdowns[i];
            if (openDropdown.classList.contains('show')) {
              openDropdown.classList.remove('show')
            }
          }
        }
      }


      const d = document.getElementById("d");
      const h = document.getElementById("h");
      const m = document.getElementById("m");
      const s = document.getElementById("s");

      function getTrueNumber(num) {
        return num < 10 ? "0" + num : num;
      }

      function calculateRemainingTime() {
        const comingYear = new Date().getFullYear() + 1;
        const comingDate = new Date(`Jan 1, ${comingYear} 00:00:00`);

        const now = new Date();
        const remainingTime = comingDate.getTime() - now.getTime();
        const days = Math.floor(remainingTime / (1000 * 60 * 60 * 24));
        const hours = Math.floor(
          (remainingTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)
        );
        const mins = Math.floor(
          (remainingTime % (1000 * 60 * 60)) / (1000 * 60)
        );
        const secs = Math.floor((remainingTime % (1000 * 60)) / 1000);

        d.innerHTML = getTrueNumber(days);
        h.innerHTML = getTrueNumber(hours);
        m.innerHTML = getTrueNumber(mins);
        s.innerHTML = getTrueNumber(secs);

        return remainingTime;
      }

      function initCountdown() {
        const interval = setInterval(() => {
          const remainingTimeInMs = calculateRemainingTime();

          if (remainingTimeInMs <= 1000) {
            clearInterval(interval);
            initCountdown();
          }
        }, 1000);
      }

      initCountdown();

      document.addEventListener("DOMContentLoaded", function() {
        
        const container = document.querySelector(".fireworks");
        let fireworks;
        
        function initializeFireworks() {
          const fireworks = new Fireworks.default(container, {
            traceLength: 4.13,
            traceSpeed: 30,
            flickering: 80,
            intensity: 15,
            explosion: 8,
            acceleration: 1.0,
            opacity: 0.2,
            rocketsPoint: {
              min: 35,
              max: 76,
            },
            sound: {
              enabled: false,
              files: [
                "sounds/explosion0.mp3",
                "sounds/explosion1.mp3",
                "sounds/explosion2.mp3",
              ],
              volume: {
                min: 2,
                max: 4,
              },
            },
            brightness: {
              min: 87,
              max: 100,
            },
            decay: {
              min: 0.015,
              max: 0.0247,
            },
            lineWidth: {
              explosion: {
                min: 1,
                max: 2.58,
              },
              trace: {
                min: 0.1,
                max: 3.71,
              },
            },
            // mouse: {
            //   click: true,
            //   move: true,
            //   max: 2,
            // },
          });
          fireworks.start();
          
          // Mouse Tracking toggle
          const trackingChkbx = document.getElementById('trackingChkbx');
          trackingChkbx.addEventListener('change', e => {
            let isChecked = Boolean(e.target.checked)
            if(e.target.checked) {
              console.log("Tracking mouse:", isChecked)
              fireworks.updateOptions({"mouse":{"click": true, "move": true, "max": 1}})
            } else if(!e.target.checked) {
              
              console.log("Tracking mouse:", isChecked )
              fireworks.updateOptions({"mouse":{"click": false, "move": false}})
            }
          });

          // Sound toggle
          const soundChkbx = document.getElementById('soundChkbx');
          soundChkbx.addEventListener('change', e => {
            let isChecked = Boolean(e.target.checked);
            if (e.target.checked) {
              console.log("Sound enabled:", isChecked)
              fireworks.updateOptions({"sound":{"enabled": true}})
            } else if(!e.target.checked) {
              console.log("Sound enabled:", isChecked)
              fireworks.updateOptions({"sound":{"enabled": false}})
            }
          })

          const toggleFireworks = document.getElementById('toggleFireworks');
          toggleFireworks.addEventListener('change', e => {
            if (e.target.checked) {
              fireworks.start();
            } else if (!e.target.checked) {
              fireworks.waitStop();
            }
          })
        }
        
        initializeFireworks();
      });
    </script>
  </body>
</html>
